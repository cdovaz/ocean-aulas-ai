<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aula de IA - Samsung Ocean USP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/estilos.css" />
  <style>
    .sumario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      z-index: 1;
    }

    .sumario-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.25rem;
      backdrop-filter: blur(8px);
      text-decoration: none;
      color: var(--texto-principal);
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .sumario-item:hover {
      transform: translateY(-4px);
      border-color: rgba(52, 184, 245, 0.4);
      background: rgba(255, 255, 255, 0.08);
    }

    .sumario-numero {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--azul-samsung) 0%, var(--roxo-ia) 100%);
    }

    .sumario-conteudo h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .sumario-conteudo p {
      font-size: 0.85rem;
      color: var(--texto-secundario);
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="slides-wrapper">
    <section class="slide active">
      <div class="grid-overlay"></div>
      <div class="top-bar"></div>
      <div class="badge">Samsung Ocean USP</div>
      <h1 class="titulo">Inteligência Artificial na Prática</h1>
      <p class="subtitulo">Selecione uma seção para começar</p>

      <div class="sumario-grid">
        <a href="paginas/pagina1.html" class="sumario-item">
          <div class="sumario-numero">01</div>
          <div class="sumario-conteudo">
            <h3>Páginas</h3>
            <p>Slides principais da aula</p>
          </div>
        </a>
        <a href="parte2/pagina1.html" class="sumario-item">
          <div class="sumario-numero">02</div>
          <div class="sumario-conteudo">
            <h3>Parte 2</h3>
            <p>Conteúdo complementar</p>
          </div>
        </a>
        <a href="parte3/pagina1.html" class="sumario-item">
          <div class="sumario-numero">03</div>
          <div class="sumario-conteudo">
            <h3>Parte 3</h3>
            <p>Tópicos avançados</p>
          </div>
        </a>
      </div>

      <div class="numero-slide">Sumário</div>
    </section>

    <div class="footer">
      <div class="logo-area">
        <span></span>
        Samsung Ocean USP
      </div>
      <div>Inteligência Artificial na Prática | 2026</div>
    </div>
  </div>
<script src="assets/js/navegacao.js"></script>
</body>
</html>
